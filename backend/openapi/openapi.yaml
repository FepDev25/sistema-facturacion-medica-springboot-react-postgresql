  /api/v1/ai/records/extract:
    post:
      tags: [AI]
      operationId: ai_records_extract
      summary: Extraer diagnosticos, prescripciones y procedimientos de notas clinicas
      description: |
        Analiza las notas clinicas de una consulta con Claude y extrae estructuradamente
        diagnosticos (con codigo ICD-10 sugerido), prescripciones de medicamentos y procedimientos.
        Los medicamentos se resuelven contra el catalogo activo (matchedMedicationId).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordExtractionRequest'
      responses:
        '200':
          description: Extraccion completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractionResult'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }

  /api/v1/ai/invoices/{id}/suggest-items:
    post:
      tags: [AI]
      operationId: ai_invoices_suggest_items
      summary: Sugerir items de facturacion para una cita
      description: |
        A partir del expediente medico asociado a la factura (diagnosticos, prescripciones,
        procedimientos), sugiere servicios y medicamentos del catalogo activo para agregar
        como items a la factura.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Sugerencias generadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemSuggestionResult'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }

  /api/v1/ai/icd10/suggest:
    post:
      tags: [AI]
      operationId: ai_icd10_suggest
      summary: Sugerir codigos ICD-10 desde descripcion clinica en lenguaje libre
      description: |
        Pipeline RAG: normaliza la descripcion con Claude, realiza busqueda semantica
        en el vector store (pgvector + nomic-embed-text), y rerankea los candidatos con Claude.
        Devuelve hasta 5 codigos ICD-10 ordenados por relevancia clinica.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Icd10Query'
      responses:
        '200':
          description: Sugerencias de codigos ICD-10
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Icd10SuggestionResult'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /api/v1/ai/patients/{patientId}/query:
    post:
      tags: [AI]
      operationId: ai_patients_query_history
      summary: Consultar el historial clinico de un paciente en lenguaje natural
      description: |
        Pipeline RAG sobre el historial clinico del paciente. En el primer query indexa
        automaticamente todos los expedientes del paciente en el vector store (on-demand).
        Queries subsiguientes usan el indice existente; re-indexacion automatica post-commit
        tras cualquier modificacion al expediente.

        Segun la intencion detectada en la pregunta, el sistema enruta a una de dos rutas:
        - **Ruta A (vector search):** busqueda semantica con topK dinamico segun el tamano
          del historial (<=8 expedientes: topK=6, 9-15: topK=10, >15: topK=15).
        - **Ruta B (contexto estructurado):** bypass del vector store para queries de resumen
          o listado completo; construye el contexto directamente desde BD con cobertura total.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientHistoryQuery'
      responses:
        '200':
          description: Respuesta generada a partir del historial clinico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientHistoryAnswer'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        description: Formato de Spring Data, por ejemplo `lastName,asc`
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        tokenType:
          type: string
          enum: [Bearer]
        role:
          type: string
        userId:
          type: string
          format: uuid
        username:
          type: string
          enum: [ADMIN, DOCTOR, RECEPTIONIST]

    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, DOCTOR, RECEPTIONIST]
        active:
          type: boolean
        doctorId:
          type: string
          format: uuid
          nullable: true
        doctorFirstName:
          type: string
          nullable: true
        doctorLastName:
          type: string
          nullable: true

    AppointmentCreateRequest:
      type: object
      required: [patientId, doctorId, scheduledAt, durationMinutes]
      properties:
        patientId:
          type: string
          format: uuid
        doctorId:
          type: string
          format: uuid
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
          minimum: 1
        chiefComplaint:
          type: string
          maxLength: 500
        notes:
          type: string
          nullable: true

    AppointmentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientFirstName: { type: string }
        patientLastName: { type: string }
        doctorId: { type: string, format: uuid }
        doctorFirstName: { type: string }
        doctorLastName: { type: string }
        scheduledAt: { type: string, format: date-time }
        scheduledEndAt: { type: string, format: date-time }
        durationMinutes: { type: integer }
        status:
          type: string
          enum: [scheduled, confirmed, in_progress, completed, cancelled, no_show]
        invoiceId: { type: string, format: uuid, nullable: true }
        invoiceNumber: { type: string, nullable: true }
        chiefComplaint: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }

    MedicalRecordCreateRequest:
      type: object
      required: [patientId, appointmentId, clinicalNotes, recordDate]
      properties:
        patientId:
          type: string
          format: uuid
        appointmentId:
          type: string
          format: uuid
        vitalSigns:
          type: object
          additionalProperties: true
          nullable: true
        physicalExam:
          type: string
          nullable: true
        clinicalNotes:
          type: string
        recordDate:
          type: string
          format: date-time

    MedicalRecordResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientFirstName: { type: string }
        patientLastName: { type: string }
        appointmentId: { type: string, format: uuid }
        vitalSigns:
          type: object
          additionalProperties: true
          nullable: true
        physicalExam: { type: string, nullable: true }
        clinicalNotes: { type: string }
        recordDate: { type: string, format: date-time }
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }

    DiagnosisCreateRequest:
      type: object
      required: [appointmentId, medicalRecordId, icd10Code, description, diagnosedAt]
      properties:
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        icd10Code:
          type: string
          maxLength: 10
          pattern: '^[A-Z][0-9]{2}(\.[0-9A-Z]{1,4})?$'
        description: { type: string }
        severity:
          type: string
          enum: [mild, moderate, severe, critical]
          nullable: true
        diagnosedAt: { type: string, format: date-time }

    DiagnosisResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        icd10Code: { type: string }
        description: { type: string }
        severity:
          type: string
          enum: [mild, moderate, severe, critical]
          nullable: true
        diagnosedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    PrescriptionCreateRequest:
      type: object
      required: [appointmentId, medicalRecordId, medicationId, dosage, frequency, durationDays]
      properties:
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        medicationId: { type: string, format: uuid }
        dosage: { type: string }
        frequency: { type: string }
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
        instructions:
          type: string
          nullable: true

    PrescriptionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        medicationId: { type: string, format: uuid }
        medicationName: { type: string }
        dosage: { type: string }
        frequency: { type: string }
        durationDays: { type: integer }
        instructions: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    ProcedureCreateRequest:
      type: object
      required: [appointmentId, medicalRecordId, procedureCode, description, performedAt]
      properties:
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        procedureCode:
          type: string
          maxLength: 50
        description: { type: string }
        notes:
          type: string
          nullable: true
        performedAt: { type: string, format: date-time }

    ProcedureResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        appointmentId: { type: string, format: uuid }
        medicalRecordId: { type: string, format: uuid }
        procedureCode: { type: string }
        description: { type: string }
        notes: { type: string, nullable: true }
        performedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    InvoiceItemRequest:
      type: object
      required: [itemType, description, quantity, unitPrice]
      properties:
        serviceId: { type: string, format: uuid, nullable: true }
        medicationId: { type: string, format: uuid, nullable: true }
        itemType:
          type: string
          enum: [service, medication, procedure, other]
        description: { type: string }
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          exclusiveMinimum: 0

    InvoiceItemResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceId: { type: string, format: uuid }
        serviceId: { type: string, format: uuid, nullable: true }
        serviceName: { type: string, nullable: true }
        medicationId: { type: string, format: uuid, nullable: true }
        medicationName: { type: string, nullable: true }
        itemType:
          type: string
          enum: [service, medication, procedure, other]
        description: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        subtotal: { type: number }
        createdAt: { type: string, format: date-time, nullable: true }

    InvoiceInsurancePolicyRequest:
      type: object
      properties:
        insurancePolicyId: { type: string, format: uuid, nullable: true }

    InvoiceResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        patientId: { type: string, format: uuid }
        patientFirstName: { type: string }
        patientLastName: { type: string }
        appointmentId: { type: string, format: uuid, nullable: true }
        insurancePolicyId: { type: string, format: uuid, nullable: true }
        invoiceNumber: { type: string }
        subtotal: { type: number }
        tax: { type: number }
        total: { type: number }
        insuranceCoverage: { type: number }
        patientResponsibility: { type: number }
        status:
          type: string
          enum: [draft, pending, partial_paid, paid, cancelled, overdue]
        issueDate: { type: string, format: date }
        dueDate: { type: string, format: date }
        notes: { type: string, nullable: true }
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceItemResponse'
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }

    InvoicePatientView:
      type: object
      properties:
        id: { type: string, format: uuid }
        dni: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        allergies: { type: string, nullable: true }

    InvoiceAppointmentView:
      type: object
      properties:
        id: { type: string, format: uuid }
        scheduledAt: { type: string, format: date-time }
        status:
          type: string
          enum: [scheduled, confirmed, in_progress, completed, cancelled, no_show]
        chiefComplaint: { type: string, nullable: true }

    InvoiceInsurancePolicyView:
      type: object
      properties:
        id: { type: string, format: uuid }
        policyNumber: { type: string }
        providerName: { type: string }
        coveragePercentage: { type: number }

    InvoiceServiceView:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        price: { type: number }

    InvoiceMedicationView:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        requiresPrescription: { type: boolean }

    InvoiceItemView:
      type: object
      properties:
        id: { type: string, format: uuid }
        service:
          allOf:
            - $ref: '#/components/schemas/InvoiceServiceView'
          nullable: true
        medication:
          allOf:
            - $ref: '#/components/schemas/InvoiceMedicationView'
          nullable: true
        itemType:
          type: string
          enum: [service, medication, procedure, other]
        description: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        subtotal: { type: number }
        createdAt: { type: string, format: date-time, nullable: true }

    InvoiceViewResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNumber: { type: string }
        patient:
          $ref: '#/components/schemas/InvoicePatientView'
        appointment:
          allOf:
            - $ref: '#/components/schemas/InvoiceAppointmentView'
          nullable: true
        insurancePolicy:
          allOf:
            - $ref: '#/components/schemas/InvoiceInsurancePolicyView'
          nullable: true
        subtotal: { type: number }
