openapi: 3.1.0
info:
  title: Sistema de Facturacion Medica API
  version: 0.7.0-draft
  description: |
    Contrato API contract-first en construccion por lotes.
    Lote 1 implementado: auth + base global.
    Lote 2 implementado: patients, doctors, insurance.
    Lote 3 implementado: appointments + medical-records.
    Lote 4 implementado: invoices + payments.
    Lote 5 implementado: catalog.
    Lote 6 implementado: AI — extraccion de notas clinicas, sugerencia de items de factura, sugerencia de codigos ICD-10.
servers:
  - url: http://localhost:8080
    description: Local dev
tags:
  - name: Auth
  - name: Appointments
  - name: Catalog Medications
  - name: Catalog Services
  - name: Invoices
  - name: Medical Records
  - name: Payments
  - name: Patients
  - name: Doctors
  - name: Insurance Providers
  - name: Insurance Policies
  - name: AI
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: auth_login
      summary: Login con usuario y contrasena
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: auth_refresh
      summary: Renovar access token con refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: auth_logout
      summary: Cerrar sesion (revoca refresh token)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout procesado
        '400': { $ref: '#/components/responses/BadRequestError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: auth_me
      summary: Obtener perfil del usuario autenticado
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /api/v1/system-users:
    get:
      tags: [Auth]
      operationId: system_users_list
      summary: Listar usuarios del sistema
      description: Requiere rol ADMIN. Permite filtrar por rol y estado activo.
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [ADMIN, DOCTOR, RECEPTIONIST]
        - name: active
          in: query
          required: false
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de usuarios del sistema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageSystemUserSummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/patients:
    post:
      tags: [Patients]
      operationId: patients_create
      summary: Crear paciente
      description: Requiere rol ADMIN o RECEPTIONIST.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreateRequest'
      responses:
        '201':
          description: Paciente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Patients]
      operationId: patients_list
      summary: Listar pacientes
      parameters:
        - name: lastName
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de pacientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagePatientSummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/patients/{id}:
    put:
      tags: [Patients]
      operationId: patients_update
      summary: Actualizar paciente
      description: Requiere rol ADMIN o RECEPTIONIST.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdateRequest'
      responses:
        '200':
          description: Paciente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Patients]
      operationId: patients_get_by_id
      summary: Obtener paciente por id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Paciente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/patients/dni/{dni}:
    get:
      tags: [Patients]
      operationId: patients_get_by_dni
      summary: Obtener paciente por DNI
      parameters:
        - name: dni
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Paciente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/patients/search:
    get:
      tags: [Patients]
      operationId: patients_autocomplete
      summary: Buscar pacientes por texto
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de coincidencias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PatientSummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/patients/{id}/appointments:
    get:
      tags: [Patients]
      operationId: patients_get_appointments
      summary: Listar citas del paciente
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de citas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAppointmentSummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/patients/{id}/policies:
    get:
      tags: [Patients]
      operationId: patients_get_policies
      summary: Listar polizas del paciente
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: onlyActive
          in: query
          required: false
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de polizas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInsurancePolicySummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/patients/{id}/invoices:
    get:
      tags: [Patients]
      operationId: patients_get_invoices
      summary: Listar facturas del paciente
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRAFT, PENDING, PARTIAL_PAID, PAID, CANCELLED, OVERDUE]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de facturas del paciente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInvoiceListViewResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/doctors:
    post:
      tags: [Doctors]
      operationId: doctors_create
      summary: Crear medico
      description: Requiere rol ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorCreateRequest'
      responses:
        '201':
          description: Medico creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Doctors]
      operationId: doctors_list
      summary: Listar medicos
      parameters:
        - name: active
          in: query
          required: false
          schema: { type: boolean }
        - name: specialty
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de medicos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDoctorSummaryResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/doctors/{id}:
    put:
      tags: [Doctors]
      operationId: doctors_update
      summary: Actualizar medico
      description: Requiere rol ADMIN.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorUpdateRequest'
      responses:
        '200':
          description: Medico actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    delete:
      tags: [Doctors]
      operationId: doctors_deactivate
      summary: Desactivar medico
      description: Requiere rol ADMIN.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204': { description: Medico desactivado }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    get:
      tags: [Doctors]
      operationId: doctors_get_by_id
      summary: Obtener medico por id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Medico encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/doctors/license/{licenseNumber}:
    get:
      tags: [Doctors]
      operationId: doctors_get_by_license
      summary: Obtener medico por numero de licencia
      parameters:
        - name: licenseNumber
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Medico encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/doctors/{id}/schedule:
    get:
      tags: [Doctors]
      operationId: doctors_get_schedule
      summary: Obtener citas ocupadas del medico
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista de citas ocupadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentSummaryResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/insurance/providers:
    post:
      tags: [Insurance Providers]
      operationId: insurance_providers_create
      summary: Crear proveedor de seguro
      description: Requiere rol ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsuranceProviderCreateRequest'
      responses:
        '201':
          description: Proveedor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceProviderResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Insurance Providers]
      operationId: insurance_providers_list
      summary: Listar proveedores de seguro
      parameters:
        - name: active
          in: query
          required: false
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de proveedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInsuranceProviderResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/insurance/providers/{id}:
    put:
      tags: [Insurance Providers]
      operationId: insurance_providers_update
      summary: Actualizar proveedor de seguro
      description: Requiere rol ADMIN.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsuranceProviderUpdateRequest'
      responses:
        '200':
          description: Proveedor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceProviderResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    delete:
      tags: [Insurance Providers]
      operationId: insurance_providers_deactivate
      summary: Desactivar proveedor de seguro
      description: Requiere rol ADMIN.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204': { description: Proveedor desactivado }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    get:
      tags: [Insurance Providers]
      operationId: insurance_providers_get_by_id
      summary: Obtener proveedor por id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Proveedor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceProviderResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/insurance/policies:
    post:
      tags: [Insurance Policies]
      operationId: insurance_policies_create
      summary: Crear poliza de seguro
      description: Requiere rol ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsurancePolicyCreateRequest'
      responses:
        '201':
          description: Poliza creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicyResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Insurance Policies]
      operationId: insurance_policies_list_by_patient
      summary: Listar polizas (todas o por paciente)
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: onlyActive
          in: query
          required: false
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Lista paginada de polizas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInsurancePolicyResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /api/v1/insurance/policies/{id}:
    put:
      tags: [Insurance Policies]
      operationId: insurance_policies_update
      summary: Actualizar poliza de seguro
      description: Requiere rol ADMIN.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsurancePolicyUpdateRequest'
      responses:
        '200':
          description: Poliza actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicyResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Insurance Policies]
      operationId: insurance_policies_get_by_id
      summary: Obtener poliza por id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Poliza encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicyResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/insurance/policies/number/{policyNumber}:
    get:
      tags: [Insurance Policies]
      operationId: insurance_policies_get_by_number
      summary: Obtener poliza por numero
      parameters:
        - name: policyNumber
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Poliza encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicyResponse'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /api/v1/appointments:
    post:
      tags: [Appointments]
      operationId: appointments_create
      summary: Crear cita
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        '201':
          description: Cita creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/UnprocessableError' }
    get:
      tags: [Appointments]
      operationId: appointments_list
      summary: Listar citas con filtros
      parameters:
        - name: doctorId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: patientId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [SCHEDULED, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, NO_SHOW]
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: to
          in: query
