spring:
  # Base de datos - apunta al contenedor Docker del docker-compose.yml
  datasource:
    url: jdbc:postgresql://localhost:5434/fac_med_db
    username: medisys
    password: medisys_dev
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: HikariPool-SFM-Dev

  # Spring AI
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false        # Solo Anthropic para chat; Ollama solo para embeddings
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: false  # La tabla la gestiona Flyway (V11)
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  # En dev se muestran las queries SQL para facilitar el desarrollo
  jpa:
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  # En dev se cargan tambien los seeds de datos de prueba
  flyway:
    locations: classpath:db/migration,classpath:db/seeds

  # Redis - contenedor Docker del docker-compose.yml
  data:
    redis:
      host: localhost
      port: 6379
  

# Logs mas detallados en desarrollo
logging:
  level:
    com.fepdev.sfm: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
