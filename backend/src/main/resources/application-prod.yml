server:
  port: ${PORT:8080}

spring:
  main:
    lazy-initialization: true

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: HikariPool-SFM-Prod

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"

  ai:
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 768
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.fepdev.sfm: INFO
    org.flywaydb: INFO
